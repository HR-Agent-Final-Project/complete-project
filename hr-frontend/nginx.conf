# ── Upstream with persistent keepalive connections to backend ─────────────────
upstream api_backend {
    server api:8080;
    keepalive 32;          # keep 32 idle connections open per nginx worker
}

server {
    listen 80;
    root   /usr/share/nginx/html;
    index  index.html;

    # ── Performance ────────────────────────────────────────────────────────────
    keepalive_timeout    65;
    keepalive_requests   500;
    sendfile             on;
    tcp_nopush           on;
    tcp_nodelay          on;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── React SPA — unknown paths fall back to index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Hashed static assets — safe to cache for 1 year ──────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy /api/* to FastAPI via keepalive upstream ─────────────────────────
    location /api/ {
        proxy_pass         http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";   # required for upstream keepalive
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 16k;
    }

    # ── Proxy uploaded files ──────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass        http://api_backend/uploads/;
        proxy_http_version 1.1;
        proxy_set_header  Connection        "";
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_cache_valid 200 10m;
    }
}
